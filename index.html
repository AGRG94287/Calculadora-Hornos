<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extrapolar Perfiles de Horneo</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #f97316;
    --accent2: #fb923c;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --green: #3fb950;
    --red: #f85149;
    --input-bg: #0d1117;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  /* HEADER */
  .header {
    width: 100%;
    max-width: 960px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-icon {
    width: 42px; height: 42px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  .header h1 {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    line-height: 1.2;
    color: var(--text);
  }

  .header p {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-family: 'Share Tech Mono', monospace;
  }

  /* MAIN CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    width: 100%;
    max-width: 960px;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::before {
    content: '';
    display: block;
    width: 3px; height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* CONFIG ROW */
  .config-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .config-panel {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  .config-panel-title {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 12px;
  }

  .form-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }

  .form-row:last-child { margin-bottom: 0; }

  label {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  input[type="number"] {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    padding: 7px 10px;
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: textfield;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  input[type="number"]:focus {
    border-color: var(--accent);
  }

  input[type="number"].invalid {
    border-color: var(--red);
    background: rgba(248,81,73,0.06);
  }

  /* CHECKBOX MASA */
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.2s;
    margin-bottom: 12px;
  }

  .checkbox-row:hover { border-color: var(--accent); }

  .checkbox-row input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  .checkbox-row span {
    font-size: 0.82rem;
    color: var(--text);
    font-weight: 500;
  }

  .masa-inputs {
    display: none;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
    animation: fadeIn 0.2s ease;
  }

  .masa-inputs.visible { display: grid; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  /* ZONAS GRID */
  .zonas-wrapper {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 16px;
  }

  .zonas-panel {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  .zona-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    animation: fadeIn 0.15s ease;
  }

  .zona-label {
    font-size: 0.78rem;
    color: var(--text-muted);
    width: 60px;
    flex-shrink: 0;
    font-family: 'Share Tech Mono', monospace;
  }

  .zona-input {
    flex: 1;
  }

  .zona-result {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    color: var(--green);
    width: 90px;
    text-align: right;
    flex-shrink: 0;
    min-height: 32px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    background: rgba(63,185,80,0.08);
    border: 1px solid rgba(63,185,80,0.2);
    border-radius: 6px;
    padding: 0 8px;
    transition: all 0.3s;
  }

  .zona-result.empty {
    background: var(--input-bg);
    border-color: var(--border);
    color: var(--text-muted);
  }

  /* BUTTONS */
  .buttons-row {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  .btn {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover {
    background: var(--accent2);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(249,115,22,0.4);
  }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    border-color: var(--text-muted);
    background: var(--border);
  }

  /* ALERT */
  .alert {
    display: none;
    background: rgba(248,81,73,0.12);
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.85rem;
    color: var(--red);
    margin-top: 12px;
    animation: fadeIn 0.2s ease;
  }

  .alert.visible { display: block; }

  /* FACTOR TAG */
  .factor-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    background: rgba(249,115,22,0.1);
    border: 1px solid rgba(249,115,22,0.3);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 20px;
    margin-top: 8px;
  }

  @media (max-width: 640px) {
    .config-grid, .zonas-wrapper { grid-template-columns: 1fr; }
    .masa-inputs { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🔥</div>
  <div>
    <h1>Extrapolar Perfiles de Horneo</h1>
    <p>Temperaturas por zona · Interpolación por solapamiento</p>
  </div>
</div>

<!-- CONFIG CARD -->
<div class="card">
  <div class="card-title">Configuración</div>

  <div class="config-grid">
    <!-- Perfil de Referencia -->
    <div class="config-panel">
      <div class="config-panel-title">Perfil de Referencia</div>
      <div class="form-row">
        <label>Tiempo de horneo (s)</label>
        <input type="number" id="tiempo1" placeholder="Ej: 205" min="0" step="0.1" oninput="soloDecimal(this)">
      </div>
      <div class="form-row">
        <label>Número de zonas (1–10)</label>
        <input type="number" id="zonas1" placeholder="Ej: 5" min="1" max="10" step="1" oninput="soloEntero(this); actualizarZonas()">
      </div>
    </div>

    <!-- Nuevo Perfil -->
    <div class="config-panel">
      <div class="config-panel-title">Nuevo Perfil</div>
      <div class="form-row">
        <label>Tiempo de horneo (s)</label>
        <input type="number" id="tiempo2" placeholder="Ej: 205" min="0" step="0.1" oninput="soloDecimal(this)">
      </div>
      <div class="form-row">
        <label>Número de zonas (1–10)</label>
        <input type="number" id="zonas2" placeholder="Ej: 5" min="1" max="10" step="1" oninput="soloEntero(this); actualizarZonas()">
      </div>
    </div>
  </div>

  <!-- Masa -->
  <div style="margin-top:16px;">
    <label class="checkbox-row" for="checkMasa">
      <input type="checkbox" id="checkMasa" onchange="toggleMasa()">
      <span>Incluir flujo másico (kg/h)</span>
    </label>
    <div class="masa-inputs" id="masaInputs">
      <div class="form-row">
        <label>Flujo másico — Horno 1 (kg/h)</label>
        <input type="number" id="masa1" min="0.01" step="0.01" placeholder="Ej: 120.5">
      </div>
      <div class="form-row">
        <label>Flujo másico — Horno 2 (kg/h)</label>
        <input type="number" id="masa2" min="0.01" step="0.01" placeholder="Ej: 95.0">
      </div>
    </div>
  </div>

  <div id="factorTag" class="factor-tag" style="display:none;">
    <span>⚡</span><span id="factorVal">Factor = —</span>
  </div>
  <div class="alert" id="alertMsg"></div>
</div>

<!-- ZONAS CARD -->
<div class="card">
  <div class="card-title">Temperaturas por Zona</div>
  <div class="zonas-wrapper">
    <!-- Input zonas -->
    <div class="zonas-panel">
      <div class="config-panel-title">Perfil de Referencia — Entrada (°C)</div>
      <div id="zonasEntrada"></div>
    </div>
    <!-- Output zonas -->
    <div class="zonas-panel">
      <div class="config-panel-title">Nuevo Perfil — Resultado (°C)</div>
      <div id="zonasSalida"></div>
    </div>
  </div>

  <div class="buttons-row">
    <button class="btn btn-secondary" onclick="borrarTodo()">Borrar todo</button>
    <button class="btn btn-primary" onclick="calcular()">🔥 Calcular Perfil</button>
  </div>
</div>

<script>
// ─── INIT ────────────────────────────────────────────────────────────────────
const sel = id => document.getElementById(id);

// Permitir solo decimales positivos (bloquea e, +, -)
function soloDecimal(el) {
  el.value = el.value.replace(/[^0-9.]/g, '').replace(/(\..*)\./g, '$1');
}

// Permitir solo enteros 1-10
function soloEntero(el) {
  el.value = el.value.replace(/[^0-9]/g, '');
  if (parseInt(el.value) > 10) el.value = 10;
  if (parseInt(el.value) < 1 && el.value !== '') el.value = 1;
}

// Bloquear teclas no numéricas en inputs decimales
document.addEventListener('keydown', function(e) {
  const el = e.target;
  if (el.tagName !== 'INPUT' || el.type !== 'number') return;
  if (['e','E','+','-'].includes(e.key)) e.preventDefault();
});

// Valores por defecto
sel('tiempo1').value = 205;
sel('tiempo2').value = 205;
sel('zonas1').value  = 5;
sel('zonas2').value  = 5;

actualizarZonas();

// ─── ZONAS ───────────────────────────────────────────────────────────────────
function actualizarZonas() {
  const N = parseInt(sel('zonas1').value) || 0;
  const M = parseInt(sel('zonas2').value) || 0;
  if (N < 1 || N > 10 || M < 1 || M > 10) return;

  // Entrada
  const entDiv = sel('zonasEntrada');
  entDiv.innerHTML = '';
  for (let i = 1; i <= N; i++) {
    entDiv.innerHTML += `
      <div class="zona-row">
        <span class="zona-label">Zona ${i}</span>
        <input type="number" class="zona-input" id="tempIn${i}" placeholder="Ej: 200" min="0" step="0.1" oninput="soloDecimal(this)">
      </div>`;
  }

  // Salida
  const salDiv = sel('zonasSalida');
  salDiv.innerHTML = '';
  for (let j = 1; j <= M; j++) {
    salDiv.innerHTML += `
      <div class="zona-row">
        <span class="zona-label">Zona ${j}</span>
        <div class="zona-result empty" id="tempOut${j}">—</div>
      </div>`;
  }
}

// ─── MASA TOGGLE ─────────────────────────────────────────────────────────────
function toggleMasa() {
  const v = sel('checkMasa').checked;
  sel('masaInputs').classList.toggle('visible', v);
  if (!v) {
    sel('masa1').value = '';
    sel('masa2').value = '';
  }
}

// ─── SOLAPAMIENTO ────────────────────────────────────────────────────────────
function calcularSolapamiento(i, j, N, M) {
  const ini_i = (i - 1) / N, fin_i = i / N;
  const ini_j = (j - 1) / M, fin_j = j / M;
  const solape = Math.max(0, Math.min(fin_j, fin_i) - Math.max(ini_j, ini_i));
  return solape / (1 / M);
}

// ─── CALCULAR ────────────────────────────────────────────────────────────────
function calcular() {
  const alertEl = sel('alertMsg');
  alertEl.classList.remove('visible');

  const T1 = parseFloat(sel('tiempo1').value);
  const T2 = parseFloat(sel('tiempo2').value);
  const N  = parseInt(sel('zonas1').value);
  const M  = parseInt(sel('zonas2').value);

  if (isNaN(T1) || T1 <= 0) { mostrarAlerta('Ingresa el tiempo de horneo del Perfil de Referencia.'); return; }
  if (isNaN(T2) || T2 <= 0) { mostrarAlerta('Ingresa el tiempo de horneo del Nuevo Perfil.'); return; }
  if (isNaN(N)  || N < 1 || N > 10) { mostrarAlerta('El número de zonas del Perfil de Referencia debe ser entre 1 y 10.'); return; }
  if (isNaN(M)  || M < 1 || M > 10) { mostrarAlerta('El número de zonas del Nuevo Perfil debe ser entre 1 y 10.'); return; }

  let factor;
  const usaMasa = sel('checkMasa').checked;

  if (usaMasa) {
    const m1 = parseFloat(sel('masa1').value);
    const m2 = parseFloat(sel('masa2').value);
    if (!m1 || !m2 || isNaN(m1) || isNaN(m2) || m1 <= 0 || m2 <= 0) {
      mostrarAlerta('Con flujo másico activo, ingresa valores numéricos mayores a 0 en ambos campos.');
      return;
    }
    factor = (T1 * m2) / (T2 * m1);
  } else {
    factor = T1 / T2;
  }

  // Mostrar factor
  sel('factorTag').style.display = 'inline-flex';
  sel('factorVal').textContent = `Factor = ${factor.toFixed(4)}`;

  // Calcular por zona destino
  for (let j = 1; j <= M; j++) {
    let tempFinal = 0, sumaPesos = 0;

    for (let i = 1; i <= N; i++) {
      const peso = calcularSolapamiento(i, j, N, M);
      const tEl = sel(`tempIn${i}`);
      if (!tEl) continue;
      const tVal = parseFloat(tEl.value);
      if (peso > 0 && !isNaN(tVal)) {
        tempFinal += tVal * peso * factor;
        sumaPesos += peso;
      }
    }

    const outEl = sel(`tempOut${j}`);
    if (sumaPesos > 0) {
      const resultado = tempFinal / sumaPesos;
      outEl.textContent = resultado.toFixed(1) + ' °C';
      outEl.classList.remove('empty');
    } else {
      outEl.textContent = '—';
      outEl.classList.add('empty');
    }
  }
}

// ─── BORRAR ──────────────────────────────────────────────────────────────────
function borrarTodo() {
  sel('tiempo1').value = '';
  sel('tiempo2').value = '';
  sel('zonas1').value  = '';
  sel('zonas2').value  = '';
  sel('checkMasa').checked = false;
  sel('masaInputs').classList.remove('visible');
  sel('masa1').value = '';
  sel('masa2').value = '';
  sel('factorTag').style.display = 'none';
  sel('alertMsg').classList.remove('visible');
  sel('zonasEntrada').innerHTML = '';
  sel('zonasSalida').innerHTML  = '';
}

function mostrarAlerta(msg) {
  const el = sel('alertMsg');
  el.textContent = '⚠ ' + msg;
  el.classList.add('visible');
}
</script>
</body>
</html>
